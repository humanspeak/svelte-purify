# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
    version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
    sources:
        - id: trunk
          ref: v1.10.0
          uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
    # definitions:
    #   - type: python
    #     runtime_environment:
    #       - name: PYTHONPATH
    #         value: api/
    enabled:
        - go@1.21.0
        - python@3.14.4
        - node@22.16.0
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
    files:
        - name: code-workspace
          extensions:
              - code-workspace
    ignore:
        - linters: [ALL]
          paths:
              - '**/worker-configuration.d.ts'
              - convex/_generated/**
        - linters: [osv-scanner]
          paths:
              - '**/pnpm-lock.yaml'
    disabled:
        - pylint
    definitions:
        - name: prettier
          files:
              - typescript
              - svelte
              - yaml
              - css
              - postcss
              - sass
              - html
              - markdown
              - json
              - javascript
              - graphql
              - prettier_supported_configs
              - code-workspace
        - name: eslint
          files:
              - typescript
              - svelte
              - javascript
        - name: bandit
          commands:
              - name: lint
                run: bandit --exit-zero --ini .bandit --format json --exclude "tests,**/tests/**" --output ${tmpfile} ${target}
    enabled:
        # - pylint@3.3.3:
        #     packages:
        #       - duckdb
        #       - polars
        #       - sqlglot
        #       - sentry_sdk
        - grype@0.112.0
        - oxipng@10.1.1
        - sql-formatter@15.8.0
        - eslint@10.4.0:
              packages:
                  - svelte-eslint-parser
                  - '@eslint/js'
                  - '@eslint/compat'
                  - typescript-eslint
                  - eslint-plugin-svelte
                  - eslint-plugin-import
        # - typescript@5.3.2
        - sort-package-json@3.6.1
        - black@26.5.1
        - actionlint@1.7.12
        - taplo@0.10.0
        - bandit@1.9.4
        - checkov@3.2.529
        - git-diff-check
        - hadolint@2.14.0
        - isort@8.0.1
        - markdownlint@0.48.0
        - osv-scanner@2.3.8
        - prettier@3.8.3:
              packages:
                  - prettier-plugin-svelte
                  - prettier-plugin-organize-imports
                  - prettier-plugin-tailwindcss
                  - prettier-plugin-sort-json
        - ruff@0.15.14
        - shellcheck@0.11.0
        - shfmt@3.6.0
        - svgo@4.0.1
        - trufflehog@3.95.3
        - yamllint@1.38.0
actions:
    disabled:
        - trunk-announce
        - trunk-fmt-pre-commit
        - trunk-check-pre-push
        - trunk-upgrade-available
